# Aevum egress controller config (sample)
STATE_FILE=/var/lib/aevum/attest/state/egress.state
NFT_FILE=/etc/nftables.d/aevum-egress.nft
DEFAULT_WINDOW_SECONDS=600

# Container egress policy during windows:
# - allow_all  : any docker bridge interface may egress during window (DNS/HTTP/S)
# - allowlist  : ONLY configured docker networks/ifaces/labels may egress during window
EGRESS_CONTAINER_MODE=allow_all

# Allowlist inputs (used only when EGRESS_CONTAINER_MODE=allowlist)
# Space-separated interface names (e.g., docker0 br-<hex>)
EGRESS_ALLOW_DOCKER_IFACES=

# Space-separated docker network names (bridges resolved via docker network inspect)
EGRESS_ALLOW_DOCKER_NETWORKS=

# Space-separated docker label filters for containers (e.g., aevum.egress=allow otherlabel)
EGRESS_ALLOW_LABELS=

# Destination allowlist during egress windows (host + containers)
# - any       : permit any destination during window (default)
# - allowlist : permit only destinations in EGRESS_ALLOW_DST_V4/V6 and resolved EGRESS_ALLOW_DOMAINS
EGRESS_DEST_MODE=any

# Space-separated IPv4 destinations (IP or CIDR)
EGRESS_ALLOW_DST_V4=

# Space-separated IPv6 destinations (IP or CIDR)
EGRESS_ALLOW_DST_V6=

# Space-separated domains to resolve to dst allowlist (best-effort; requires DNS during a window)
EGRESS_ALLOW_DOMAINS=

# DNS allowlist during egress windows
# - any       : allow DNS to any resolver during window (default)
# - allowlist : allow DNS only to EGRESS_DNS_SERVERS_V4/V6 during window
EGRESS_DNS_MODE=any

# Space-separated DNS resolvers (IPs)
EGRESS_DNS_SERVERS_V4=1.1.1.1 8.8.8.8
EGRESS_DNS_SERVERS_V6=2606:4700:4700::1111 2001:4860:4860::8888
