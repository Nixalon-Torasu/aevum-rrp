# Aevum controlplane hardening controls
# 1 = enforce, 0 = disable

# Require HEAD to be an exact, *signed* git tag before staged apply promotes changes.
CONTROLPLANE_REQUIRE_SIGNED_TAG=1

# Require clean working tree.
CONTROLPLANE_REQUIRE_CLEAN_TREE=1

# Require HEAD commit signature to verify (git verify-commit HEAD)
CONTROLPLANE_REQUIRE_SIGNED_COMMIT=1

# Optional allowlist of allowed origin hosts (space-separated). If empty, do not enforce.
# Example: CONTROLPLANE_ALLOWED_REMOTES="github.com git.example.com"
CONTROLPLANE_ALLOWED_REMOTES=

# GPG verification allowlist paths (used by git tag/commit verification)
CONTROLPLANE_GNUPGHOME="/etc/aevum/gnupg"
CONTROLPLANE_TRUSTEDKEYS_DIR="/etc/aevum/trustedkeys.d"

# Optional GitOps tag selection for update runner
# Leave TARGET_TAG empty to select latest by TAG_PATTERN
CONTROLPLANE_TARGET_TAG=""
CONTROLPLANE_TAG_PATTERN="v*"
