# Aevum bundle: essentials
BUNDLE_NAME="Essentials (hardware + ops tools)"
APT_PACKAGES=(
  tpm2-tools
  # base tooling
  curl wget ca-certificates gnupg jq tmux vim-nox ripgrep fd-find
  htop btop iotop iftop nload ncdu rsync unzip zip
  # hardware + health
  linux-firmware amd64-microcode fwupd
  pciutils usbutils dmidecode lshw hwloc numactl
  lm-sensors i2c-tools nvme-cli smartmontools hdparm ethtool
  rasdaemon edac-utils
  # time sync (keeps receipts sane)
  chrony
)
POST_COMMANDS=(
  "systemctl enable --now chrony || true"
  "yes | sensors-detect --auto || true"
  "/opt/aevum-tools/bin/aevum-receipt note \"essentials post\" component=bundle note=\"chrony+sensors\" || true"
)
