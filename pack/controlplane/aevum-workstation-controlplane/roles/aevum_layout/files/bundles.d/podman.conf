# Aevum bundle: podman
BUNDLE_NAME="Podman (rootless-capable containers)"
APT_PACKAGES=(
  podman podman-compose slirp4netns uidmap fuse-overlayfs
)
POST_COMMANDS=(
  "podman --version || true"
  "loginctl enable-linger $(logname 2>/dev/null || echo root) || true"
  "/opt/aevum-tools/bin/aevum-receipt note \"podman post\" component=bundle || true"
)
