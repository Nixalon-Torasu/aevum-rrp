# /etc/aevum/hardening.conf
# Site-local knobs for optional hardening. Sourceable by scripts.

# Auto-enroll TPM2 for root LUKS (danger: you must be ready for TPM-bound unlock policy)
AEVUM_AUTO_ENROLL_TPM2_ROOT=0

# PCR policy for TPM-bound LUKS enroll (comma-separated). PCR7 is SecureBoot state; include PCR0/2 for firmware/boot loader.
AEVUM_TPM2_PCRS="0,2,7"

# Snapshot mode: auto (btrfs if available else tar)
AEVUM_SNAPSHOT_MODE="auto"

# Drift scan paths (space-separated)
AEVUM_DRIFT_PATHS="/etc/aevum /etc/systemd/system /usr/local/sbin /opt/aevum-tools/bin /etc/audit/rules.d /etc/sysctl.d"
