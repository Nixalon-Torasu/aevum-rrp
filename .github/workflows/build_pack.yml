name: build-pack

on:
  push:
    branches: [ "main" ]
    tags: [ "v*" ]
  pull_request:

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Build release zip
        run: |
          sudo apt-get update
          sudo apt-get install -y zip
          ./tools/build_release_zip.sh vCI

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: aevum-pack
          path: dist/*.zip
