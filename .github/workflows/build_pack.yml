name: build-pack

on:
  push:
    branches: [ "main" ]
    tags: [ "v*" ]
  pull_request:

permissions:
  contents: write
  id-token: write  # Required for keyless Sigstore signing

jobs:
  build:
    runs-on: ubuntu-24.04
    env:
      AEVUM_BUILDER_ID: "github-actions/${{ github.run_id }}"
      # Explicit build timestamp so SLSA metadata is never 'unknown'.
      # Set once here; consumed by all provenance-generation steps.
      AEVUM_BUILD_TS: "${{ github.event.repository.updated_at }}"

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y zip jq
          # Pinned versions for reproducible, auditable builds.
          pip install "in-toto==2.3.0" "cryptography==42.0.8"

      - name: Install cosign
        uses: sigstore/cosign-installer@v3

      - name: Set version
        id: version
        run: |
          if [[ "${GITHUB_REF}" == refs/tags/* ]]; then
            echo "version=${GITHUB_REF#refs/tags/}" >> "$GITHUB_OUTPUT"
          else
            echo "version=vCI-${GITHUB_SHA::8}" >> "$GITHUB_OUTPUT"
          fi

      - name: Build release zip
        run: |
          ./tools/build_release_zip.sh "${{ steps.version.outputs.version }}"

      - name: Generate in-toto link attestations for printer artifacts
        run: |
          python3 tools/generate_pack_manifest.py
          python3 - <<'PY'
          import json, hashlib, os, glob

          def sha256file(p):
            h = hashlib.sha256()
            with open(p, 'rb') as f:
              for chunk in iter(lambda: f.read(65536), b''): h.update(chunk)
            return h.hexdigest()

          ts = os.environ.get('GITHUB_SHA', 'unknown')[:8]
          builder = os.environ.get('AEVUM_BUILDER_ID', 'github-actions')
          dist_zips = glob.glob('dist/*.zip')
          products = {os.path.basename(z): {'sha256': sha256file(z)} for z in dist_zips}

          link = {
            "signed": {
              "_type": "link",
              "name": "build",
              "materials": {"git:" + os.environ.get('GITHUB_SHA','unknown'): {"sha256": hashlib.sha256(os.environ.get('GITHUB_SHA','unknown').encode()).hexdigest()}},
              "products": products,
              "byproducts": {},
              "command": ["tools/build_release_zip.sh"],
              "environment": {
                "AEVUM_BUILDER_ID": builder,
                "GIT_COMMIT": os.environ.get('GITHUB_SHA', 'unknown'),
                "GITHUB_WORKFLOW": os.environ.get('GITHUB_WORKFLOW', '')
              }
            },
            "signatures": []
          }
          os.makedirs('dist/provenance/in-toto/links', exist_ok=True)
          os.makedirs('dist/provenance/in-toto/keys', exist_ok=True)
          with open('dist/provenance/in-toto/links/build.link', 'w') as f:
            json.dump(link, f, indent=2); f.write('\n')
          print(f'[ok] build.link written with {len(products)} products')

          # Auto-generate root.layout from the emitted links.
          # Collect any functionary keyids from signed links (empty in dev/CI keyless mode).
          keyids = set()
          for sig in link.get("signatures", []):
            if sig.get("keyid"):
              keyids.add(sig["keyid"])
          if not keyids:
            keyids = {"PLACEHOLDER_NO_FUNCTIONARY_KEY_IN_CI"}

          keys_section = {kid: {"keytype": "ed25519", "keyid": kid,
                                "keyid_hash_algorithms": ["sha256","sha512"],
                                "keyval": {"public": "RESOLVE_FROM_RELEASE_KEY_FILE"}}
                          for kid in keyids}
          functionary_list = [{"type": "functionary", "keyid": k} for k in keyids]

          layout = {
            "signed": {
              "_type": "layout",
              "expires": "2027-01-01T00:00:00Z",
              "readme": "Auto-generated by build_pack.yml. Populate functionary key material before distributing.",
              "keys": keys_section,
              "steps": [
                {
                  "_type": "step",
                  "name": "build",
                  "functionaries": functionary_list,
                  "expected_materials": [["MATCH", "git:*", "WITH", "PRODUCTS", "FROM", "build"]],
                  "expected_products": [["CREATE", "*.zip"]],
                  "run": ["tools/build_release_zip.sh"],
                  "pubkeys": list(keyids),
                  "threshold": 1
                }
              ],
              "inspect": []
            },
            "signatures": []
          }
          with open('dist/provenance/in-toto/root.layout', 'w') as f:
            json.dump(layout, f, indent=2); f.write('\n')
          print('[ok] root.layout auto-generated')
          PY

      - name: Generate SLSA provenance for printer artifacts
        run: |
          python3 - <<'PY'
          import json, hashlib, os, glob

          def sha256file(p):
            h = hashlib.sha256()
            with open(p, 'rb') as f:
              for chunk in iter(lambda: f.read(65536), b''): h.update(chunk)
            return h.hexdigest()

          dist_zips = glob.glob('dist/*.zip')
          subjects = [{"name": os.path.basename(z), "digest": {"sha256": sha256file(z)}} for z in dist_zips]
          git_commit = os.environ.get('GITHUB_SHA', 'unknown')
          repo = os.environ.get('GITHUB_REPOSITORY', 'aevum/aevum-rrp')
          ref = os.environ.get('GITHUB_REF', 'unknown')

          slsa = {
            "_type": "https://in-toto.io/Statement/v0.1",
            "predicateType": "https://slsa.dev/provenance/v0.2",
            "subject": subjects,
            "predicate": {
              "buildType": "https://aevum.dev/buildType/rrp/v1",
              "builder": {"id": f"https://github.com/{repo}/actions/runs/{os.environ.get('GITHUB_RUN_ID','0')}"},
              "invocation": {
                "configSource": {
                  "uri": f"git+https://github.com/{repo}@{ref}",
                  "digest": {"sha1": git_commit},
                  "entryPoint": ".github/workflows/build_pack.yml"
                }
              },
              "metadata": {
                "buildStartedOn": os.environ.get('AEVUM_BUILD_TS') or os.environ.get('GITHUB_RUN_STARTED_AT') or __import__('datetime').datetime.utcnow().isoformat() + 'Z',
                "buildFinishedOn": __import__('datetime').datetime.utcnow().isoformat() + 'Z',
                "completeness": {"parameters": True, "environment": True, "materials": True},
                "reproducible": False
              },
              "materials": [{"uri": f"git+https://github.com/{repo}", "digest": {"sha1": git_commit}}]
            }
          }
          os.makedirs('dist/provenance', exist_ok=True)
          with open('dist/provenance/aevum-rrp.slsa.json', 'w') as f:
            json.dump(slsa, f, indent=2); f.write('\n')
          print('[ok] SLSA provenance written')
          PY

      - name: Sign printer artifacts with Sigstore (keyless)
        if: startsWith(github.ref, 'refs/tags/')
        run: |
          for z in dist/*.zip; do
            cosign sign-blob \
              --bundle "dist/provenance/$(basename "$z" .zip).sigstore.bundle.json" \
              "$z"
            echo "[ok] signed: $z"
          done

      - name: Upload artifacts
        uses: actions/upload-artifact@v4
        with:
          name: aevum-rrp-${{ steps.version.outputs.version }}
          path: dist/

      - name: Create GitHub Release
        if: startsWith(github.ref, 'refs/tags/')
        uses: softprops/action-gh-release@v2
        with:
          files: |
            dist/*.zip
            dist/provenance/*.slsa.json
            dist/provenance/*.sigstore.bundle.json
            dist/provenance/in-toto/root.layout
            dist/provenance/in-toto/links/*.link
            dist/provenance/in-toto/keys/*
